appId: com.ciphervault.app
productName: CipherVault
publish:
  provider: github
  owner: vipecoder228
  repo: CipherVault
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!scripts/*'
  - '!*.nsh'
  - '!*.nsl'
asarUnpack:
  - resources/**
win:
  executableName: CipherVault
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  include: customInstall.nsh
  language: 1033
  runAfterFinish: false
  unicode: true
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
linux:
  artifactName: ${name}-${version}-linux.${ext}
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  icon: resources
  maintainer: CipherVault
  vendor: CipherVault
  category: Utility
  desktop:
    Name: CipherVault
    Comment: Secure desktop password manager
    Keywords: password;security;encryption;vault;
deb:
  artifactName: ${name}-${version}-linux.${ext}
  depends:
    - libnotify4
    - libsecret-1-0
    - libatspi2.0-0
rpm:
  artifactName: ${name}-${version}-linux.${ext}
  depends:
    - libnotify
    - libsecret
    - at-spi2-core
