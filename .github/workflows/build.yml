name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Build Electron app
        run: npm run build

      - name: Package Electron app
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CERTIFICATE_FILE: ${{ secrets.WIN_CERTIFICATE_FILE }}
          WIN_CERTIFICATE_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      - name: Upload Windows builds to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          draft: false
          prerelease: false

  build-macos:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Build Electron app
        run: npm run build

      - name: Package macOS app
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload macOS builds to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          draft: false
          prerelease: false

  build-linux:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Build Electron app
        run: npm run build

      - name: Package Linux packages
        run: |
          for i in 1 2 3; do
            npm run dist && break
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux builds to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          draft: false
          prerelease: false

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Build web assets
        run: npm run build:web

      - name: Add Android platform (if not exists)
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set version in build.gradle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          sed -i "s/versionCode 1/versionCode ${VERSION//./}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$VERSION\"/" android/app/build.gradle

      - name: Build Android APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Build Android AAB (for Play Store)
        working-directory: android
        run: chmod +x gradlew && ./gradlew bundleDebug

      - name: Rename Android artifacts
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mv android/app/build/outputs/apk/debug/app-debug.apk "dist/CipherVault-${VERSION}-android.apk"
          mv android/app/build/outputs/bundle/debug/app-debug.aab "dist/CipherVault-${VERSION}-android.aab"

      - name: Upload Android builds to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CipherVault-*-android.apk
            dist/CipherVault-*-android.aab
          draft: false
          prerelease: false
